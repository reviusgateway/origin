<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feedback</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        body { 
            background-color: #f4f4f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* Gereksiz mobil kaydırmaları engeller */
        }
        .card { 
            background: #ffffff; 
            width: 100%; 
            max-width: 400px; 
            padding: 40px 24px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            text-align: center; 
        }
        .logo { 
            width: auto;      
            max-width: 180px;      
            height: 70px;      
            object-fit: contain;      
            margin-bottom: 25px; 
        }
        h2 { 
            color: #1d1d1f; 
            font-size: 22px; 
            font-weight: 600; 
            margin-bottom: 12px; 
            line-height: 1.3; 
        }
        p { 
            color: #86868b; 
            font-size: 15px; 
            margin-bottom: 30px; 
            line-height: 1.4; 
            padding: 0 10px; 
        }
        .stars { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 15px; 
            direction: rtl; 
        }
        .stars input { display: none; }
        .stars label { 
            font-size: 48px; 
            color: #e5e5ea; 
            cursor: pointer; 
            transition: color 0.2s ease, transform 0.1s ease; 
            -webkit-user-select: none; /* Mobil tarayıcıda basılı tutunca seçilmeyi engeller */
            user-select: none;
        }
        .stars label:active { transform: scale(0.85); }
        .stars input:checked ~ label, .stars label:hover, .stars label:hover ~ label { color: #ffcc00; }
        .footer-text { 
            font-size: 10px; 
            color: #c5c5c7; 
            margin-top: 35px; 
            letter-spacing: 0.8px; 
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Restoran Logosu -->
    <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/150?text=Welcome'">
    
    <!-- Dinamik Metin Alanları -->
    <h2 id="title">...</h2>
    <p id="subtitle">...</p>
    
    <!-- Yıldızlar -->
    <div class="stars">
        <input type="radio" id="star5" name="rating" value="5" onclick="handleRating(5)"><label for="star5">★</label>
        <input type="radio" id="star4" name="rating" value="4" onclick="handleRating(4)"><label for="star4">★</label>
        <input type="radio" id="star3" name="rating" value="3" onclick="handleRating(3)"><label for="star3">★</label>
        <input type="radio" id="star2" name="rating" value="2" onclick="handleRating(2)"><label for="star2">★</label>
        <input type="radio" id="star1" name="rating" value="1" onclick="handleRating(1)"><label for="star1">★</label>
    </div>

    <div class="footer-text">POWERED BY REVIUSGATEWAY</div>
</div>

<script>
    // =========================================================
    // 🔗 RESTORAN ÖZEL AYARLARI (Her yeni müşteride sadece burayı değiştir)
    // =========================================================
    const GOOGLE_MAPS_URL = "https://search.google.com/local/writereview?placeid=ChIJg6giq2KZ3BQRQElWE4GjfaM"; 
    const COMPLAINT_PAGE_URL = "complaint.html"; 

    // 🌍 Dil Sözlüğü
    const translations = {
        tr: {
            title: "Deneyiminizi Değerlendirin",
            subtitle: "Size daha iyi hizmet verebilmemiz için lütfen puanınızı seçin."
        },
        en: {
            title: "Rate Your Experience",
            subtitle: "Please select your rating to help us serve you better."
        },
        ru: {
            title: "Оцените ваш опыт",
            subtitle: "Пожалуйста, выберите оценку, чтобы помочь нам стать лучше."
        },
        de: {
            title: "Bewerten Sie uns",
            subtitle: "Bitte wählen Sie Ihre Bewertung, um uns zu helfen, Sie besser zu bedienen."
        }
    };

    // Global dil değişkeni (Şikayet sayfasına paslamak için)
    let activeLang = 'en';

    // 📱 Cihaz Dilini Algılama ve Uygulama
    function initializeLanguage() {
        if (localStorage.getItem('feedback_submitted') === 'true') {
            window.location.href = COMPLAINT_PAGE_URL;
            return; // Fonksiyonu durdu
        let userLang = (navigator.language || navigator.userLanguage).toLowerCase().slice(0, 2);
        
        if (translations[userLang]) {
            activeLang = userLang;
        }

        document.getElementById('title').innerText = translations[activeLang].title;
        document.getElementById('subtitle').innerText = translations[activeLang].subtitle;
    }

    // ⭐ Yönlendirme Algoritması
    function handleRating(stars) {
        if (stars >= 4) {
            window.location.href = GOOGLE_MAPS_URL;
        } else {
            // Dil bilgisini URL parametresi olarak şikayet sayfasına gönderiyoruz
           window.location.href = `${COMPLAINT_PAGE_URL}?lang=${activeLang}&rating=${stars}`;
        }
    }

    // Sayfa yüklendiğinde tetikle
    window.onload = initializeLanguage;
</script>

</body>
</html>
