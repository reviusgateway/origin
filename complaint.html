<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feedback</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #f4f4f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #ffffff; width: 100%; max-width: 400px; padding: 30px 24px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .logo { width: 70px; height: 70px; object-fit: cover; border-radius: 50%; margin-bottom: 15px; }
        h2 { color: #1d1d1f; font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        p { color: #86868b; font-size: 14px; margin-bottom: 20px; line-height: 1.4; }
        textarea { width: 100%; height: 120px; padding: 14px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 15px; resize: none; margin-bottom: 15px; outline: none; transition: border 0.2s; }
        textarea:focus { border-color: #0071e3; }
        
        /* İletişim Sorusu Alanı */
        .contact-question { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin-bottom: 20px; background: #f5f5f7; padding: 12px; border-radius: 12px; text-align: left; cursor: pointer; }
        .contact-question input { width: 18px; height: 18px; cursor: pointer; }
        .contact-question label { font-size: 14px; color: #1d1d1f; cursor: pointer; font-weight: 500; user-select: none; }
        
        /* Gizli İletişim Alanları */
        .contact-fields { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s ease-in-out; }
        .contact-fields.show { max-height: 150px; opacity: 1; margin-bottom: 5px; }
        
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 14px; margin-bottom: 12px; outline: none; }
        input:focus { border-color: #0071e3; }
        
        button { background: #0071e3; color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 5px; }
        button:hover { background: #0077ed; }
        .footer-text { font-size: 10px; color: #c5c5c7; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/150?text=Welcome'">
    
    <h2 id="form-title">Görüşleriniz Bizim İçin Değerli</h2>
    <p id="form-subtitle">Lütfen yaşadığınız olumsuz deneyimi bizimle paylaşın, durumu hemen düzeltelim.</p>
    
    <!-- 📄 ENTEGRE EDİLMİŞ GOOGLE FORM ALTYAPISI -->
    <form action="https://docs.google.com/forms/d/e/1FAIpQLScAX5wCCohN3JWCt5oyUKKOULSeWnxM1al1W8e2Ip9bDvp3aQ/formResponse" method="POST">
        
        <!-- Mesaj Kutusu -->
        <textarea name="entry.206411797" id="placeholder-msg" placeholder="Mesajınız..." required></textarea>
        
        <!-- İletişim isteği sorusu -->
        <div class="contact-question" onclick="toggleContact()">
            <input type="checkbox" id="want-contact">
            <label for="want-contact" id="label-question">Benimle iletişime geçilmesini istiyorum</label>
        </div>
        
        <!-- Gizli Alanlar -->
        <div class="contact-fields" id="contact-fields-div">
            <input type="text" name="entry.1226065416" id="placeholder-name" placeholder="Adınız Soyadınız">
            <input type="tel" name="entry.174241772" id="placeholder-phone" placeholder="Telefon Numaranız">
        </div>
        
        <button type="submit" id="btn-text">Gönder</button>
    </form>

    <div class="footer-text">POWERED BY REVIUSGATEWAY</div>
</div>

<script>
    // 🌍 Dil Paketleri (TR, EN, RU, DE)
    const translations = {
        tr: {
            title: "Görüşleriniz Bizim İçin Değerli",
            subtitle: "Lütfen yaşadığınız olumsuz deneyimi bizimle paylaşın, durumu hemen düzeltelim.",
            msg: "Mesajınız...", question: "Şikayetimle ilgili geri iletişime geçilmesini istiyorum", 
            name: "Adınız Soyadınız", phone: "Telefon Numaranız", btn: "Gönder"
        },
        en: {
            title: "Your Feedback is Valuable",
            subtitle: "Please share your negative experience with us so we can improve our service.",
            msg: "Your message...", question: "I want to be contacted regarding this matter", 
            name: "Your Name", phone: "Your Phone Number", btn: "Submit"
        },
        ru: {
            title: "Ваш отзыв важен для нас",
            subtitle: "Пожалуйста, поделитесь своим негативным опытом, чтобы мы могли все исправить.",
            msg: "Ваше сообщение...", question: "Я хочу, чтобы со мной связались по этому вопросу", 
            name: "Ваше имя", phone: "Номер телефона", btn: "Отправить"
        },
        de: {
            title: "Ihr Feedback ist uns wichtig",
            subtitle: "Bitte teilen Sie uns Ihre negative Erfahrung mit, damit wir uns verbessern können.",
            msg: "Ihre Nachricht...", question: "Ich möchte in dieser Angelegenheit kontaktiert werden", 
            name: "Ihr Name", phone: "Ihre Telefonnummer", btn: "Absenden"
        }
    };

    function setLanguage() {
        let userLang = (navigator.language || navigator.userLanguage).toLowerCase().slice(0, 2);
        if (!translations[userLang]) userLang = 'en';

        document.getElementById('form-title').innerText = translations[userLang].title;
        document.getElementById('form-subtitle').innerText = translations[userLang].subtitle;
        document.getElementById('placeholder-msg').placeholder = translations[userLang].msg;
        document.getElementById('label-question').innerText = translations[userLang].question;
        document.getElementById('placeholder-name').placeholder = translations[userLang].name;
        document.getElementById('placeholder-phone').placeholder = translations[userLang].phone;
        document.getElementById('btn-text').innerText = translations[userLang].btn;
    }

    function toggleContact() {
        const checkbox = document.getElementById('want-contact');
        const fieldsDiv = document.getElementById('contact-fields-div');
        const nameInput = document.getElementById('placeholder-name');
        const phoneInput = document.getElementById('placeholder-phone');
        
        if (event.target.id !== 'want-contact' && event.target.id !== 'label-question') {
            checkbox.checked = !checkbox.checked;
        }

        if (checkbox.checked) {
            fieldsDiv.classList.add('show');
            nameInput.required = true;
            phoneInput.required = true;
        } else {
            fieldsDiv.classList.remove('show');
            nameInput.required = false;
            phoneInput.required = false;
        }
    }

    window.onload = setLanguage;
</script>

</body>
</html>
